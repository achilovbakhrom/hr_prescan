[tool.ruff]
target-version = "py314"
line-length = 120
src = ["."]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "S",    # flake8-bandit
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "DJ",   # flake8-django
    "T20",  # flake8-print
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "S101",   # allow assert in tests
    "RUF012", # mutable class attributes (Django models use them)
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config", "integrations"]

[tool.ruff.lint.per-file-ignores]
# Tests: hardcoded passwords/tokens are expected fixtures; long assertion lines OK.
"**/tests/**/*.py" = ["S101", "S105", "S106", "S108", "S311", "E501"]
# Auto-generated migrations have long help_text strings; data-seed migrations
# contain legitimate Uzbek/Russian strings that Ruff flags as ambiguous unicode.
"**/migrations/*.py" = ["E501", "DJ001", "RUF001", "RUF003", "RUF022"]
# i18n / AI prompt files have long translated strings and legit non-ASCII.
"**/i18n.py" = ["RUF001", "E501"]
"**/prompts.py" = ["E501", "RUF001"]
"**/tool_definitions.py" = ["E501", "RUF001"]
"**/settings/**/*.py" = ["F401", "F403"]

[tool.mypy]
python_version = "3.12"
plugins = [
    "mypy_django_plugin.main",
    "mypy_drf_plugin.main",
]
# Strict typing is a long-term goal — turning it on now surfaces hundreds of
# pre-existing errors (missing model annotations, celery/otel stubs). Relax
# while we bring the codebase up to shape; re-enable strict gradually.
warn_unreachable = true
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = false
disable_error_code = [
    "var-annotated",   # Django model fields don't need explicit types with django-stubs
    "attr-defined",    # User model dynamic attrs (company_id etc.) via select_related
    "no-untyped-def",  # legacy fns without annotations
    "union-attr",      # optional-attr access patterns
    "assignment",
    "arg-type",
    "return-value",
    "misc",
]

[[tool.mypy.overrides]]
module = [
    "celery",
    "celery.*",
    "opentelemetry",
    "opentelemetry.*",
    "livekit",
    "livekit.*",
]
ignore_missing_imports = true
ignore_errors = true

[tool.django-stubs]
django_settings_module = "config.settings.local"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
