# Development overrides — auto-loaded by `docker compose up`
# Debug ports exposed, dev servers

services:
  # Use Vite dev server instead of Nginx + built assets
  nginx:
    profiles:
      - prod-only
    # Disabled in dev — use frontend service instead

  # Frontend dev server (Vite)
  frontend:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${LOCAL_FRONTEND_PORT:-5173}:5173"
    env_file:
      - ./frontend/.env
    networks:
      - frontend

  # Django dev server (runserver instead of gunicorn)
  django:
    entrypoint: []
    command: >
      bash -c "
        python manage.py migrate --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
    ports:
      - "${LOCAL_DJANGO_PORT:-8000}:8000"

  # Expose PostgreSQL for local tools
  postgres:
    ports:
      - "${LOCAL_POSTGRES_PORT:-5432}:5432"

  # Expose Redis for local tools
  redis:
    ports:
      - "${LOCAL_REDIS_PORT:-6380}:6379"

  # Expose RabbitMQ ports (AMQP + Management UI)
  rabbitmq:
    ports:
      - "${LOCAL_RABBITMQ_PORT:-5672}:5672"
      - "${LOCAL_RABBITMQ_MGMT_PORT:-15672}:15672"

  # Celery worker
  celery-worker:
    entrypoint: []
    command: python dev_autoreload.py celery -A config worker -l info --concurrency=2
    volumes:
      - ./backend:/app

  # Celery beat
  celery-beat:
    entrypoint: []
    command: python dev_autoreload.py celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app

  # Expose MinIO ports (API + Console)
  minio:
    ports:
      - "${LOCAL_MINIO_API_PORT:-9000}:9000"
      - "${LOCAL_MINIO_CONSOLE_PORT:-9001}:9001"
