name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-quality:
    name: Backend — Lint, Format, Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff mypy django-stubs djangorestframework-stubs
      - name: Ruff lint
        run: ruff check backend/
      - name: Ruff format check
        run: ruff format --check backend/
      - name: Mypy type check
        run: mypy backend/

  frontend-quality:
    name: Frontend — Lint, Format, Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npm run lint
      - name: Prettier format check
        run: cd frontend && npx prettier --check "src/**/*.{ts,vue,json,css,scss}"
      - name: TypeScript type check
        run: cd frontend && npx vue-tsc --noEmit

  # Uncomment when tests are added post-MVP:
  # backend-test:
  #   name: Backend — Tests
  #   needs: [backend-quality]
  #   ...
  # frontend-test:
  #   name: Frontend — Tests
  #   needs: [frontend-quality]
  #   ...

  build:
    needs: [backend-quality, frontend-quality]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: ./livekit-agent
          push: true
          tags: ghcr.io/${{ github.repository }}/livekit-agent:${{ github.sha }}
