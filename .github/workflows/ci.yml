name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-quality:
    name: Backend — Lint, Format, Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff mypy django-stubs djangorestframework-stubs
      - name: Ruff lint
        run: ruff check backend/
      - name: Ruff format check
        run: ruff format --check backend/
      - name: Mypy type check
        run: mypy backend/

  frontend-quality:
    name: Frontend — Lint, Format, Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npm run lint
      - name: Prettier format check
        run: cd frontend && npx prettier --check "src/**/*.{ts,vue,json,css,scss}"
      - name: TypeScript type check
        run: cd frontend && npx vue-tsc --noEmit

  # Uncomment when tests are added post-MVP:
  # backend-test:
  #   name: Backend — Tests
  #   needs: [backend-quality]
  #   ...
  # frontend-test:
  #   name: Frontend — Tests
  #   needs: [frontend-quality]
  #   ...

  # Image builds handled by cd.yml (main) and cd-dev.yml (dev) workflows.
