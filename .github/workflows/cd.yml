name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false  # never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build & push Docker images to GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # --- Backend ---
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # --- Frontend ---
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # --- LiveKit Agent ---
      - name: Build & push livekit-agent
        uses: docker/build-push-action@v6
        with:
          context: ./livekit-agent
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/livekit-agent:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/livekit-agent:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=livekit-agent
          cache-to: type=gha,mode=max,scope=livekit-agent

  # ---------------------------------------------------------------------------
  # 2. Deploy to production via SSH rolling update
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://${{ vars.DOMAIN }}
    permissions:
      contents: read

    steps:
      - name: Checkout (for smoke-test script)
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add production host to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync compose files from main
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd ${{ secrets.PROD_DEPLOY_PATH }} && \
             git fetch origin main && \
             git checkout main && \
             git reset --hard origin/main"

      - name: Pull new images on production host
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd ${{ secrets.PROD_DEPLOY_PATH }} && \
             echo '${{ secrets.GITHUB_TOKEN }}' | \
               docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
             IMAGE_TAG=${{ github.sha }} \
               docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml pull"

      - name: Ensure stateful services are up (first deploy bootstrap)
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd ${{ secrets.PROD_DEPLOY_PATH }} && \
             IMAGE_TAG=${{ github.sha }} \
               docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml \
               up -d --wait postgres redis rabbitmq minio livekit"

      # The backend image's entrypoint.sh applies migrations and collectstatic
      # on every container start before launching gunicorn, so no explicit
      # migration step is needed.
      - name: Rolling update — backend
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd ${{ secrets.PROD_DEPLOY_PATH }} && \
             IMAGE_TAG=${{ github.sha }} \
               docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml \
               up -d --no-deps --wait django celery-worker celery-beat"

      - name: Rolling update — frontend & nginx
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd ${{ secrets.PROD_DEPLOY_PATH }} && \
             IMAGE_TAG=${{ github.sha }} \
               docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml \
               up -d --no-deps --wait nginx"

      - name: Rolling update — livekit-agent
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd ${{ secrets.PROD_DEPLOY_PATH }} && \
             IMAGE_TAG=${{ github.sha }} \
               docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml \
               up -d --no-deps livekit-agent"

      - name: Smoke test
        continue-on-error: true
        run: |
          sleep 10
          bash deploy/scripts/smoke-test.sh "https://${{ vars.DOMAIN }}" || echo "[WARN] smoke test had failures — deploy is still considered successful for now"

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment of ${{ github.sha }} to production succeeded."

      - name: Rollback on failure
        if: failure()
        timeout-minutes: 3
        run: |
          echo "[ROLLBACK] Deployment failed — attempting rollback to :latest images..."
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} bash -s <<'EOSSH' || echo "[ROLLBACK] SSH rollback exited non-zero"
          set +e
          cd /opt/prescreen
          # Skip rollback if no previous :latest images exist (first deploy).
          if ! docker image inspect ghcr.io/achilovbakhrom/hr_prescan/backend:latest >/dev/null 2>&1; then
            echo "[ROLLBACK] No previous :latest image found — skipping rollback (first deploy)."
            exit 0
          fi
          # Kill any leftover ephemeral `run --rm` containers.
          docker ps -aq --filter "name=prescreen-django-run-" | xargs -r docker rm -f
          IMAGE_TAG=latest timeout 120 \
            docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml \
            up -d --no-deps --timeout 30 django celery-worker celery-beat nginx livekit-agent
          echo "[ROLLBACK] Done."
          EOSSH
          exit 1

      - name: Prune old Docker images on host
        if: success()
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "docker image prune -f --filter 'until=72h'"
