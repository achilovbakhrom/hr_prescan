name: CD — Deploy to Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: dev-deploy
  cancel-in-progress: true  # unlike prod, it's OK to cancel an in-flight dev deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  DEV_IMAGE_TAG: dev-${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build & push — GitHub-hosted runner (fast upload to GHCR)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ env.DEV_IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/backend:dev
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,mode=max,scope=backend-dev

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ env.DEV_IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/frontend:dev
          build-args: |
            VITE_API_URL=https://dev.prescreen-app.com/api
            VITE_LIVEKIT_URL=wss://dev.prescreen-app.com/ws/
            VITE_GOOGLE_CLIENT_ID=64156241192-ul3jng69g72u46vadaf8h4kt1jpahbpm.apps.googleusercontent.com
            VITE_TELEGRAM_BOT_USERNAME=candidate_preview_ai_dev_bot
            VITE_TELEGRAM_BOT_ID=8640891941
            VITE_TELEGRAM_CANDIDATE_BOT_USERNAME=candidate_preview_ai_dev_bot
            VITE_BILLING_ENABLED=false
          cache-from: type=gha,scope=frontend-dev
          cache-to: type=gha,mode=max,scope=frontend-dev

      - name: Build & push livekit-agent
        uses: docker/build-push-action@v6
        with:
          context: ./livekit-agent
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/livekit-agent:${{ env.DEV_IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/livekit-agent:dev
          cache-from: type=gha,scope=livekit-agent-dev
          cache-to: type=gha,mode=max,scope=livekit-agent-dev

  # ---------------------------------------------------------------------------
  # 2. Deploy — self-hosted runner IS the dev server (no SSH required)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Dev
    runs-on: [self-hosted, dev-server]
    needs: build-and-push
    environment:
      name: development
      url: https://${{ vars.DEV_DOMAIN }}
    defaults:
      run:
        working-directory: ${{ vars.DEV_DEPLOY_PATH }}
    env:
      # Three-file override stack: base → prod settings → staging resource limits
      CF: -f docker-compose.yml -f deploy/docker-compose.prod.yml -f deploy/docker-compose.staging.yml
      MONITORING_CF: -f docker-compose.yml -f deploy/docker-compose.prod.yml -f deploy/docker-compose.staging.yml -f deploy/docker-compose.monitoring.yml

    steps:
      - name: Sync compose files
        # Deploy dir is a pure mirror of origin/dev — never edit files here.
        # Using `reset --hard` instead of `pull` so any accidental local drift
        # (e.g. a file touched on the server) doesn't wedge future deploys
        # behind "would be overwritten by merge" errors.
        run: |
          git fetch origin dev
          git checkout -f dev
          git reset --hard origin/dev
          git clean -fd

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull new images
        run: IMAGE_TAG=${{ env.DEV_IMAGE_TAG }} docker compose $CF pull

      - name: Ensure observability stack is up
        run: |
          docker compose $MONITORING_CF pull grafana prometheus loki promtail jaeger
          docker compose $MONITORING_CF up -d --wait grafana prometheus loki promtail jaeger

      - name: Ensure stateful services are up (first deploy bootstrap)
        run: |
          IMAGE_TAG=${{ env.DEV_IMAGE_TAG }} \
            docker compose $CF up -d --wait postgres redis rabbitmq minio livekit

      # Validate the new image imports cleanly — Django's `check` walks
      # the full URL tree, so any SyntaxError / ImportError inside app
      # modules surfaces here instead of after swap-in when the site is
      # already 504-ing. Fail-fast: if this fails we never roll the
      # broken image into rotation.
      - name: Validate new backend image (django check)
        run: |
          IMAGE_TAG=${{ env.DEV_IMAGE_TAG }} \
            docker compose $CF run --rm --no-deps django python manage.py check --deploy --fail-level=ERROR

      # The backend image's entrypoint.sh applies migrations and collectstatic
      # on every container start before launching gunicorn, so no explicit
      # migration step is needed. Health check waits until that's done.
      - name: Rolling update — backend (zero-downtime on subsequent deploys)
        run: |
          # If no django container exists yet (first deploy), this just creates one.
          # If one exists, it scales to 2 so traffic is never dropped, then scales back.
          CURRENT=$(docker compose $CF ps -q django | wc -l)
          if [ "$CURRENT" -eq 0 ]; then
            echo "First deploy: starting django container"
            IMAGE_TAG=${{ env.DEV_IMAGE_TAG }} \
              docker compose $CF up -d --no-deps --wait django
          else
            echo "Rolling update: scale 2 -> 1"
            IMAGE_TAG=${{ env.DEV_IMAGE_TAG }} \
              docker compose $CF up -d --no-deps --scale django=2 --no-recreate django
            for i in $(seq 1 24); do
              HEALTHY=$(docker compose $CF ps --format '{{.Service}} {{.Health}}' | grep -c '^django healthy$' || true)
              [ "$HEALTHY" -ge 1 ] && break
              echo "Waiting for new Django container... (${i}/24)"
              sleep 5
            done
            docker compose $CF exec -T nginx nginx -s reload || true
            IMAGE_TAG=${{ env.DEV_IMAGE_TAG }} \
              docker compose $CF up -d --no-deps --scale django=1 django
          fi

      - name: Rolling update — celery (graceful drain)
        run: |
          # SIGTERM lets workers finish their current task before stopping
          docker compose $CF stop celery-worker
          IMAGE_TAG=${{ env.DEV_IMAGE_TAG }} \
            docker compose $CF up -d --no-deps --wait celery-worker celery-beat

      - name: Rolling update — frontend & nginx
        run: |
          IMAGE_TAG=${{ env.DEV_IMAGE_TAG }} \
            docker compose $CF up -d --no-deps --wait nginx

      - name: Rolling update — livekit-agent
        run: |
          IMAGE_TAG=${{ env.DEV_IMAGE_TAG }} \
            docker compose $CF up -d --no-deps livekit-agent

      - name: Smoke test
        continue-on-error: true
        run: |
          sleep 10
          bash deploy/scripts/smoke-test.sh "https://${{ vars.DEV_DOMAIN }}" || echo "[WARN] smoke test had failures — deploy is still considered successful for now"

      - name: Rollback on failure
        if: failure()
        timeout-minutes: 3
        run: |
          echo "[ROLLBACK] Attempting rollback to :dev images..."
          # Skip rollback entirely if no previous :dev images exist (first deploy).
          if ! docker image inspect ghcr.io/${{ github.repository }}/backend:dev >/dev/null 2>&1; then
            echo "[ROLLBACK] No previous :dev image found — skipping rollback (first deploy)."
            exit 1
          fi
          # Kill any leftover `run --rm` ephemeral containers that can wedge compose.
          docker ps -aq --filter "name=prescreen-django-run-" | xargs -r docker rm -f || true
          # --timeout 30 so stuck containers are force-killed quickly.
          # No --wait: we don't block on health; if new images were worse than old,
          # at least previous containers come back up.
          IMAGE_TAG=dev timeout 120 \
            docker compose $CF up -d --no-deps --timeout 30 \
              django celery-worker celery-beat nginx livekit-agent \
            || echo "[ROLLBACK] compose up timed out or partially failed — leaving state as-is"
          echo "[ROLLBACK] Done."
          exit 1

      # Always runs — keeps the dev server disk clean
      - name: Cleanup Docker artifacts
        if: always()
        run: |
          docker image prune -f
          docker builder prune -f --keep-storage 3GB
          docker container prune -f

      - name: Prune old images
        if: success()
        run: docker image prune -f --filter "until=72h"
