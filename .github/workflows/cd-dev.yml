name: CD — Deploy to Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: dev-deploy
  cancel-in-progress: true  # unlike prod, it's OK to cancel an in-flight dev deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build & push — GitHub-hosted runner (fast upload to GHCR)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/backend:dev
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,mode=max,scope=backend-dev

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:dev
          cache-from: type=gha,scope=frontend-dev
          cache-to: type=gha,mode=max,scope=frontend-dev

      - name: Build & push livekit-agent
        uses: docker/build-push-action@v6
        with:
          context: ./livekit-agent
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/livekit-agent:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/livekit-agent:dev
          cache-from: type=gha,scope=livekit-agent-dev
          cache-to: type=gha,mode=max,scope=livekit-agent-dev

  # ---------------------------------------------------------------------------
  # 2. Deploy — self-hosted runner IS the dev server (no SSH required)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Dev
    runs-on: [self-hosted, dev-server]
    needs: build-and-push
    environment:
      name: development
      url: https://${{ vars.DEV_DOMAIN }}
    defaults:
      run:
        working-directory: ${{ vars.DEV_DEPLOY_PATH }}
    env:
      # Three-file override stack: base → prod settings → staging resource limits
      CF: -f docker-compose.yml -f deploy/docker-compose.prod.yml -f deploy/docker-compose.staging.yml

    steps:
      - name: Sync compose files
        run: |
          git fetch origin dev
          git checkout dev
          git pull origin dev

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull new images
        run: IMAGE_TAG=${{ github.sha }} docker compose $CF pull

      - name: Ensure stateful services are up (first deploy bootstrap)
        run: |
          IMAGE_TAG=${{ github.sha }} \
            docker compose $CF up -d --wait postgres redis rabbitmq minio livekit

      # The backend image's entrypoint.sh applies migrations and collectstatic
      # on every container start before launching gunicorn, so no explicit
      # migration step is needed. Health check waits until that's done.
      - name: Rolling update — backend (zero-downtime on subsequent deploys)
        run: |
          # If no django container exists yet (first deploy), this just creates one.
          # If one exists, it scales to 2 so traffic is never dropped, then scales back.
          CURRENT=$(docker compose $CF ps -q django | wc -l)
          if [ "$CURRENT" -eq 0 ]; then
            echo "First deploy: starting django container"
            IMAGE_TAG=${{ github.sha }} \
              docker compose $CF up -d --no-deps --wait django
          else
            echo "Rolling update: scale 2 -> 1"
            IMAGE_TAG=${{ github.sha }} \
              docker compose $CF up -d --no-deps --scale django=2 --no-recreate django
            for i in $(seq 1 24); do
              HEALTHY=$(docker compose $CF ps --format '{{.Service}} {{.Health}}' | grep -c '^django healthy$' || true)
              [ "$HEALTHY" -ge 1 ] && break
              echo "Waiting for new Django container... (${i}/24)"
              sleep 5
            done
            docker compose $CF exec -T nginx nginx -s reload || true
            IMAGE_TAG=${{ github.sha }} \
              docker compose $CF up -d --no-deps --scale django=1 django
          fi

      - name: Rolling update — celery (graceful drain)
        run: |
          # SIGTERM lets workers finish their current task before stopping
          docker compose $CF stop celery-worker
          IMAGE_TAG=${{ github.sha }} \
            docker compose $CF up -d --no-deps --wait celery-worker celery-beat

      - name: Rolling update — frontend & nginx
        run: |
          IMAGE_TAG=${{ github.sha }} \
            docker compose $CF up -d --no-deps --wait nginx

      - name: Rolling update — livekit-agent
        run: |
          IMAGE_TAG=${{ github.sha }} \
            docker compose $CF up -d --no-deps livekit-agent

      - name: Smoke test
        run: |
          sleep 5
          bash deploy/scripts/smoke-test.sh "https://${{ vars.DEV_DOMAIN }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "[ROLLBACK] Rolling back to :dev images..."
          IMAGE_TAG=dev \
            docker compose $CF \
            up -d --no-deps django celery-worker celery-beat nginx livekit-agent
          echo "[ROLLBACK] Complete."
          exit 1

      # Always runs — keeps the dev server disk clean
      - name: Cleanup Docker artifacts
        if: always()
        run: |
          docker image prune -f
          docker builder prune -f --keep-storage 3GB
          docker container prune -f

      - name: Prune old images
        if: success()
        run: docker image prune -f --filter "until=72h"
