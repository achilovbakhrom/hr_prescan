# Monitoring stack — run with:
# docker compose -f docker-compose.yml -f deploy/docker-compose.monitoring.yml up -d
#
# Ports bind to localhost by default. Use SSH tunnels for remote servers or set
# MONITORING_BIND_ADDRESS=0.0.0.0 only behind a trusted firewall/VPN.

services:
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-grafana.${DOMAIN}}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN:-grafana.${DOMAIN}}/
      GF_SECURITY_COOKIE_SECURE: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
      - frontend-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - monitoring
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:16686:16686"
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    volumes:
      - jaeger_data:/badger
    networks:
      - monitoring
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M

  loki:
    image: grafana/loki:latest
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:3100:3100"
    command:
      - "-config.file=/etc/loki/loki.yml"
    volumes:
      - ./deploy/monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 64M

  promtail:
    image: grafana/promtail:latest
    command:
      - "-config.file=/etc/promtail/promtail.yml"
    volumes:
      - ./deploy/monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    networks:
      - monitoring
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M

volumes:
  grafana_data:
  prometheus_data:
  jaeger_data:
  loki_data:
  promtail_positions:

networks:
  monitoring:
  frontend-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-prescreen}_frontend-net
  backend:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-prescreen}_backend
