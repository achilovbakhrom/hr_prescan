apiVersion: 1

datasources:
  - name: Prometheus
    uid: DS_PROMETHEUS
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: DS_LOKI
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        - name: trace_id
          matcherRegex: '"trace_id":"([a-fA-F0-9]+)"'
          url: "$${__value.raw}"
          datasourceUid: DS_JAEGER

  - name: Jaeger
    uid: DS_JAEGER
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
